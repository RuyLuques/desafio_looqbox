name: CI - Looqbox Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: looqbox_challenge
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/looqbox_challenge
      RAW_TABLE: vendas_raw
      PROCESSED_TABLE: vendas_processadas

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: sleep 5

      - name: Initialize Database
        run: |
          sudo apt-get install -y postgresql-client
          psql -h localhost -U postgres -d looqbox_challenge -f docker/init.sql
        env:
          PGPASSWORD: postgres

      - name: Run Tests
        run: pytest