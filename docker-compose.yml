version: '3.9'

services:
  db:
    image: postgres:15
    container_name: looqbox_db
    environment:
      POSTGRES_DB: looqbox_challenge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    container_name: looqbox_app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: